<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DK Vol.11 Stock Realtime</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Sarabun', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f1ed;
            color: #333;
            padding: 0;
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, #8B3A3A 0%, #A50000 100%);
            padding: 30px 20px;
            text-align: center;
            color: white;
            position: relative;
        }
        
        .header::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 15px;
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #8B3A3A;
            font-size: 20px;
        }
        
        .header h1 {
            font-size: 2em;
            margin-bottom: 5px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        
        .header p {
            font-size: 0.95em;
            opacity: 0.95;
            color: #FFD700;
        }
        
        .realtime-badge {
            position: absolute;
            right: 20px;
            top: 20px;
            background: rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            border: 1px solid rgba(255,255,255,0.4);
            color: #00FF88;
            font-weight: 600;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .e-catalog-link {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
        }
        
        .e-catalog-link:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            transform: translateY(-2px);
        }
        
        .e-catalog-icon {
            font-size: 2em;
        }
        
        .e-catalog-text h3 {
            color: #8B3A3A;
            font-size: 1.1em;
            margin-bottom: 3px;
        }
        
        .e-catalog-text p {
            color: #999;
            font-size: 0.9em;
        }
        
        .e-catalog-arrow {
            margin-left: auto;
            color: #8B3A3A;
            font-size: 1.5em;
        }
        
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 10px 20px;
            border: 2px solid #ddd;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            font-family: 'Sarabun', sans-serif;
            transition: all 0.3s ease;
            font-size: 0.95em;
        }
        
        .filter-btn.active {
            background: #8B3A3A;
            color: white;
            border-color: #8B3A3A;
        }
        
        .filter-btn:hover {
            border-color: #8B3A3A;
        }
        
        .section-title {
            color: #8B3A3A;
            font-size: 1.2em;
            font-weight: 700;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #8B3A3A;
        }
        
        .table-wrapper {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        thead {
            background: #8B3A3A;
            color: white;
        }
        
        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-size: 0.95em;
        }
        
        td {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        tbody tr:hover {
            background: #fafafa;
        }
        
        .sku-cell {
            font-weight: 600;
            color: #8B3A3A;
            font-size: 1em;
        }
        
        .yard-cell {
            text-align: right;
            color: #333;
            font-weight: 600;
        }
        
        .roll-cell {
            text-align: center;
            color: #666;
        }
        
        .zero-stock {
            background: #fff5f5;
            opacity: 0.7;
        }
        
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #8B3A3A;
        }
        
        .spinner {
            border: 4px solid #f0f0f0;
            border-top: 4px solid #8B3A3A;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error {
            background: #fff5f5;
            color: #c00;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #c00;
            text-align: center;
        }
        
        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .summary-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #8B3A3A;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .summary-label {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        
        .summary-value {
            font-size: 1.8em;
            font-weight: 700;
            color: #8B3A3A;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5em;
            }
            
            .filters {
                gap: 8px;
            }
            
            .filter-btn {
                padding: 8px 15px;
                font-size: 0.9em;
            }
            
            th, td {
                padding: 12px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="realtime-badge">🟢 REALTIME</div>
        <h1>DK Vol.11 — Special</h1>
        <p>ผ้าบาน · สติ่อกพร้อมส่ง</p>
    </div>
    
    <div class="container">
        <a href="#" class="e-catalog-link">
            <div class="e-catalog-icon">📖</div>
            <div class="e-catalog-text">
                <h3>E-Catalog DK Vol.11</h3>
                <p>ดูรายวางค่ารบทกรรมศิลป์</p>
            </div>
            <div class="e-catalog-arrow">›</div>
        </a>
        
        <div class="section-title">สต็อกกงเหลือ</div>
        
        <div class="summary" id="summary">
            <div class="summary-box">
                <div class="summary-label">📊 SKU ทั้งหมด</div>
                <div class="summary-value" id="sku-count">-</div>
            </div>
            <div class="summary-box">
                <div class="summary-label">📏 รวมยาร์ด</div>
                <div class="summary-value" id="total-yard">-</div>
            </div>
            <div class="summary-box">
                <div class="summary-label">🎯 มีสต็อก</div>
                <div class="summary-value" id="in-stock">-</div>
            </div>
        </div>
        
        <div class="filters">
            <button class="filter-btn active" onclick="filterStock('all')">ทั้งหมด</button>
            <button class="filter-btn" onclick="filterStock('available')">มีสต็อก ✓</button>
            <button class="filter-btn" onclick="filterStock('low')">ไม่มีสต็อก ⚠</button>
            <button class="filter-btn" onclick="filterStock('zero')">หมดแล้ว ✕</button>
        </div>
        
        <div class="table-wrapper">
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>กำลังโหลดสต็อก Realtime...</p>
            </div>
            <div id="error" class="error" style="display:none;"></div>
            <table id="stock-table" style="display:none;">
                <thead>
                    <tr>
                        <th>SKU</th>
                        <th>Collection</th>
                        <th style="text-align: right;">ยาร์ด</th>
                        <th style="text-align: center;">Roll</th>
                        <th>Last Update</th>
                    </tr>
                </thead>
                <tbody id="stock-body">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let allData = [];
        let currentFilter = 'all';
        
        // Google Visualization API
        google.charts.load('current', {'packages':['corechart', 'table']});
        
        // Google Sheet Configuration
        const SHEET_ID = '1yZFro_wolqOYbojUHrVoKzirmcusMQgZJj8PdgaOglU';
        const SHEET_NAME = 'DK_VOL11';
        
        function fetchStock() {
            const query = new google.visualization.Query(
                `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${SHEET_NAME}`
            );
            
            query.setQuery('select A, B, C, D, E');
            query.send(function(response) {
                if (response.isError()) {
                    showError('❌ ไม่สามารถโหลดสต็อก: ' + response.getMessage());
                    return;
                }
                
                const data = response.getDataTable();
                const rows = data.getNumberOfRows();
                
                allData = [];
                let totalYard = 0;
                let inStock = 0;
                let latestDate = '';
                
                for (let i = 0; i < rows; i++) {
                    const sku = data.getValue(i, 0) || '';
                    const collection = data.getValue(i, 1) || '';
                    const yard = parseFloat(data.getValue(i, 2)) || 0;
                    const roll = parseInt(data.getValue(i, 3)) || 0;
                    const updateDate = data.getValue(i, 4) || '';
                    
                    if (sku) {
                        allData.push({ sku, collection, yard, roll, updateDate });
                        totalYard += yard;
                        if (yard > 0) inStock++;
                        if (!latestDate || new Date(updateDate) > new Date(latestDate)) {
                            latestDate = updateDate;
                        }
                    }
                }
                
                // Render table with current filter
                renderTable();
                
                // Update summary
                document.getElementById('sku-count').textContent = allData.length;
                document.getElementById('total-yard').textContent = totalYard.toFixed(2);
                document.getElementById('in-stock').textContent = inStock;
            });
        }
        
        function renderTable() {
            const tbody = document.getElementById('stock-body');
            tbody.innerHTML = '';
            
            let filtered = allData;
            if (currentFilter === 'available') {
                filtered = allData.filter(item => item.yard > 0);
            } else if (currentFilter === 'low') {
                filtered = allData.filter(item => item.yard === 0 && item.roll > 0);
            } else if (currentFilter === 'zero') {
                filtered = allData.filter(item => item.yard === 0 && item.roll === 0);
            }
            
            filtered.forEach(item => {
                const row = document.createElement('tr');
                if (item.yard === 0) row.classList.add('zero-stock');
                
                row.innerHTML = `
                    <td class="sku-cell">${item.sku}</td>
                    <td>${item.collection}</td>
                    <td class="yard-cell">${item.yard.toFixed(2)} หลา</td>
                    <td class="roll-cell">${item.roll}</td>
                    <td>${item.updateDate}</td>
                `;
                tbody.appendChild(row);
            });
            
            // Show table, hide loading
            document.getElementById('loading').style.display = 'none';
            document.getElementById('stock-table').style.display = 'table';
        }
        
        function filterStock(filter) {
            currentFilter = filter;
            
            // Update button styles
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderTable();
        }
        
        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
        
        // Initial load when Google Charts is ready
        google.charts.setOnLoadCallback(fetchStock);
        
        // Refresh every 5 minutes
        setInterval(fetchStock, 5 * 60 * 1000);
    </script>
</body>
</html>
