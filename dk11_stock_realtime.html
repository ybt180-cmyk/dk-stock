<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DK Vol.11 Stock Realtime</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Sarabun', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #333;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 5px;
            font-weight: 700;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .status {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .status-item {
            background: rgba(255,255,255,0.1);
            padding: 10px 15px;
            border-radius: 8px;
            color: white;
            font-size: 0.95em;
            border-left: 3px solid #00d4ff;
        }
        
        .status-item.updated {
            border-left-color: #00ff88;
        }
        
        .table-wrapper {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        thead {
            background: linear-gradient(135deg, #8B0000 0%, #A50000 100%);
            color: white;
        }
        
        th {
            padding: 18px;
            text-align: left;
            font-weight: 600;
            font-size: 1em;
            letter-spacing: 0.5px;
        }
        
        td {
            padding: 16px 18px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        tbody tr {
            transition: background-color 0.2s ease;
        }
        
        tbody tr:hover {
            background-color: #f9f9f9;
        }
        
        tbody tr:last-child td {
            border-bottom: none;
        }
        
        .sku-cell {
            font-weight: 600;
            color: #1a1a2e;
            font-size: 1.05em;
        }
        
        .yard-cell {
            text-align: right;
            color: #d6c8b9;
            font-weight: 600;
        }
        
        .roll-cell {
            text-align: center;
            background: #f5f5f5;
            border-radius: 6px;
            color: #555;
            font-weight: 600;
        }
        
        .date-cell {
            color: #999;
            font-size: 0.9em;
        }
        
        .zero-stock {
            background-color: #ffe0e0;
            color: #c00;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
        }
        
        .spinner {
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #00d4ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error {
            background: #fee;
            color: #c00;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #c00;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 0.9em;
        }
        
        .price-info {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: white;
            text-align: center;
            font-weight: 600;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            th, td {
                padding: 12px;
                font-size: 0.9em;
            }
            
            .status {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 DK Vol.11 Stock Realtime</h1>
            <p>บริษัท ดาริกา จำกัด | สต็อกผ้า ปัจจุบัน</p>
        </div>
        
        <div class="price-info">
            💰 ราคา 99 บาท/หลา | 📞 สั่งซื้อผ่าน LINE OA
        </div>
        
        <div class="status">
            <div class="status-item">
                📊 SKU: <span id="sku-count">-</span>
            </div>
            <div class="status-item">
                📏 รวมยาร์ด: <span id="total-yard">-</span>
            </div>
            <div class="status-item updated">
                ⏱️ ล่าสุด: <span id="last-update">-</span>
            </div>
        </div>
        
        <div class="table-wrapper">
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>กำลังโหลดสต็อก...</p>
            </div>
            <div id="error" class="error" style="display:none;"></div>
            <table id="stock-table" style="display:none;">
                <thead>
                    <tr>
                        <th style="width: 20%;">SKU</th>
                        <th style="width: 25%;">Collection</th>
                        <th style="width: 25%; text-align: right;">ยาร์ด</th>
                        <th style="width: 15%; text-align: center;">Roll</th>
                        <th style="width: 15%;">Last Update</th>
                    </tr>
                </thead>
                <tbody id="stock-body">
                </tbody>
            </table>
        </div>
        
        <div class="footer">
            🔄 หมายเหตุ: สต็อกอัปเดตอัตโนมัติจาก Mirror Sheet
        </div>
    </div>

    <script>
        // Google Sheet Configuration
        const SHEET_ID = '1yZFro_wolqOYbojUHrVoKzirmcusMQgZJj8PdgaOglU';
        const SHEET_NAME = 'DK_VOL11';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${SHEET_NAME}`;

        // Fetch stock data
        async function fetchStock() {
            try {
                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error('Failed to fetch stock');
                
                const csv = await response.text();
                const rows = csv.trim().split('\n');
                
                // Parse header
                const headers = rows[0].split(',').map(h => h.replace(/"/g, '').trim());
                
                // Find column indices
                const skuIdx = headers.findIndex(h => h.toLowerCase() === 'sku');
                const collectionIdx = headers.findIndex(h => h.toLowerCase() === 'collection');
                const yardIdx = headers.findIndex(h => h.toLowerCase() === 'totalfullrollyard');
                const rollIdx = headers.findIndex(h => h.toLowerCase() === 'rollcount');
                const updateIdx = headers.findIndex(h => h.toLowerCase() === 'lastupdate');
                
                if (skuIdx === -1) throw new Error('SKU column not found');
                
                // Parse data rows
                const data = [];
                let totalYard = 0;
                let latestDate = '';
                
                for (let i = 1; i < rows.length; i++) {
                    if (!rows[i].trim()) continue;
                    
                    // Simple CSV parse (handle quoted fields)
                    const cells = [];
                    let current = '';
                    let inQuotes = false;
                    
                    for (let j = 0; j < rows[i].length; j++) {
                        const char = rows[i][j];
                        if (char === '"') {
                            inQuotes = !inQuotes;
                        } else if (char === ',' && !inQuotes) {
                            cells.push(current.trim());
                            current = '';
                        } else {
                            current += char;
                        }
                    }
                    cells.push(current.trim());
                    
                    const sku = cells[skuIdx]?.replace(/"/g, '') || '';
                    const collection = cells[collectionIdx]?.replace(/"/g, '') || '';
                    const yard = parseFloat(cells[yardIdx]?.replace(/"/g, '') || 0) || 0;
                    const roll = parseInt(cells[rollIdx]?.replace(/"/g, '') || 0) || 0;
                    const updateDate = cells[updateIdx]?.replace(/"/g, '') || '';
                    
                    if (sku) {
                        data.push({ sku, collection, yard, roll, updateDate });
                        totalYard += yard;
                        if (!latestDate || new Date(updateDate) > new Date(latestDate)) {
                            latestDate = updateDate;
                        }
                    }
                }
                
                // Render table
                renderTable(data, totalYard, latestDate);
                
                // Update status
                document.getElementById('sku-count').textContent = data.length;
                document.getElementById('total-yard').textContent = totalYard.toFixed(2);
                document.getElementById('last-update').textContent = latestDate || '-';
                
            } catch (error) {
                console.error('Stock fetch error:', error);
                showError(`❌ ไม่สามารถโหลดสต็อก: ${error.message}`);
            }
        }
        
        function renderTable(data, totalYard, latestDate) {
            const tbody = document.getElementById('stock-body');
            tbody.innerHTML = '';
            
            data.forEach(item => {
                const row = document.createElement('tr');
                if (item.yard === 0) row.classList.add('zero-stock');
                
                row.innerHTML = `
                    <td class="sku-cell">${item.sku}</td>
                    <td>${item.collection}</td>
                    <td class="yard-cell">${item.yard.toFixed(2)} หลา</td>
                    <td class="roll-cell">${item.roll}</td>
                    <td class="date-cell">${item.updateDate}</td>
                `;
                tbody.appendChild(row);
            });
            
            // Show table, hide loading
            document.getElementById('loading').style.display = 'none';
            document.getElementById('stock-table').style.display = 'table';
        }
        
        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
        
        // Initial load
        fetchStock();
        
        // Refresh every 5 minutes
        setInterval(fetchStock, 5 * 60 * 1000);
    </script>
</body>
</html>
